<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#073f34" />
    <meta name="description" content="スマホの横画面で遊べる、CPU二人との三人麻雀半荘戦。" />
    <title>三麻ひとり打ち</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="三人麻雀ゲーム">
      <header class="topbar">
        <div>
          <p class="eyebrow">HALF GAME · SANMA</p>
          <h1>三麻ひとり打ち</h1>
        </div>
        <button id="new-game" class="icon-button" type="button" aria-label="半荘を最初から">↻</button>
      </header>

      <section class="table" aria-live="polite">
        <div class="opponent opponent-left">
          <div class="player-card">
            <span id="wind-1" class="wind">南</span>
            <span>CPU 青</span>
            <strong id="score-1">35,000</strong>
            <em id="nuki-1" class="nuki-count" hidden>北×0</em>
          </div>
          <div class="hidden-hand"><img src="./img/hai/ura.png" alt="伏せ牌" /><span id="cpu1-count">13</span></div>
          <div id="melds-1" class="meld-row"></div>
        </div>

        <div class="opponent opponent-right">
          <div class="player-card">
            <span id="wind-2" class="wind">西</span>
            <span>CPU 橙</span>
            <strong id="score-2">35,000</strong>
            <em id="nuki-2" class="nuki-count" hidden>北×0</em>
          </div>
          <div class="hidden-hand"><img src="./img/hai/ura.png" alt="伏せ牌" /><span id="cpu2-count">13</span></div>
          <div id="melds-2" class="meld-row"></div>
        </div>

        <div id="river-1" class="river river-left" aria-label="CPU青の捨て牌"></div>
        <div id="river-2" class="river river-right" aria-label="CPU橙の捨て牌"></div>

        <section class="center-panel">
          <div class="round-info">
            <span id="round-mark" class="round-mark">東一局</span>
            <span id="round-sub">0本場</span>
          </div>
          <div class="dora-box">
            <span>ドラ表示</span>
            <div id="dora-list" class="dora-list"><img src="./img/hai/1p.png" alt="ドラ表示牌" /></div>
          </div>
          <strong id="wall-count" class="wall-count">残り 54</strong>
          <span id="riichi-sticks" class="riichi-sticks">供託 0</span>
        </section>

        <div id="river-0" class="river river-player" aria-label="あなたの捨て牌"></div>
        <p id="status" class="status">あなたの番です。牌を選んでください</p>
      </section>

      <section class="controls" aria-label="操作">
        <div id="action-bar" class="action-bar" hidden>
          <button id="win-action" class="action primary" type="button">ツモ</button>
          <button id="reach-action" class="action reach" type="button" hidden>リーチ</button>
          <button id="north-action" class="action north" type="button" hidden>北抜き</button>
          <button id="pon-action" class="action call" type="button" hidden>ポン</button>
          <button id="kan-action" class="action call" type="button" hidden>カン</button>
          <button id="pass-action" class="action secondary" type="button" hidden>見送る</button>
        </div>
        <div class="self-info">
          <span id="wind-0" class="wind dealer">東</span>
          <span>あなた</span>
          <em id="nuki-0" class="nuki-count" hidden>北×0</em>
          <strong id="score-0">35,000</strong>
        </div>
        <div id="melds-0" class="meld-row meld-self"></div>
        <div id="hand" class="hand" aria-label="あなたの手牌"></div>
        <p class="hint">牌をタップして打牌</p>
      </section>

      <dialog id="result-dialog" class="result-dialog">
        <div class="result-mark" id="result-mark">和</div>
        <p id="result-eyebrow" class="eyebrow">HAND RESULT</p>
        <h2 id="result-title">ツモ！</h2>
        <p id="result-detail">あなたの和了です</p>
        <div id="result-hand" class="result-hand"></div>
        <div id="result-yaku" class="result-yaku"></div>
        <div id="result-scores" class="result-scores"></div>
        <button id="play-again" class="action primary wide" type="button">次の局</button>
      </dialog>
    </main>

    <aside class="rotate-notice" aria-label="画面回転のお願い">
      <div class="phone-icon" aria-hidden="true">↻</div>
      <strong>スマホを横向きにしてください</strong>
      <span>牌が大きく、卓全体が見やすくなります</span>
    </aside>
    <script src="./scoring.js"></script>
    <script type="module" src="./game.js"></script>
  </body>
</html>
